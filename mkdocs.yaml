theme:
  name: material

markdown_extensions:
  # --- The "Extra" Bundle (Enables 8 extensions at once) ---
  - pymdownx.extra
  
  # --- Specific Inline Formatting ---
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  # --- Advanced Blocks ---
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # --- Data & Utilities ---
  - pymdownx.snippets:
      base_path: ["docs"]
  - pymdownx.progressbar
  - pymdownx.magiclink
